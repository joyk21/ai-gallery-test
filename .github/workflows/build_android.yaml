name: Build AI Gallery - API Server Edition (Force Mode)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Force Pull Edge Server Code (PR #647)
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          # 直接强制重置本地分支为官方 PR 的内容，彻底跳过 Merge 冲突
          git remote add upstream https://github.com/google-ai-edge/gallery.git
          git fetch upstream pull/647/head:edge-server-branch
          git reset --hard edge-server-branch

      - name: Co-existence & Translation
        run: |
          # 1. 动态查找并修改包名
          find . -name "build.gradle*" -exec sed -i 's/com.google.ai.edge.gallery/com.google.ai.edge.gallery.api/g' {} +
          
          # 2. 汉化 strings.xml (适配新路径)
          STRINGS_PATH="Android/app/src/main/res/values/strings.xml"
          if [ -f "$STRINGS_PATH" ]; then
            sed -i 's/>Google AI Edge Gallery</>AI Edge API版</g' "$STRINGS_PATH"
            sed -i 's/>Settings</>设置</g' "$STRINGS_PATH"
            sed -i 's/>Benchmark</>性能评测</g' "$STRINGS_PATH"
            sed -i 's/>Edge Server</>API 服务器</g' "$STRINGS_PATH"
            sed -i 's/>Server running</>服务器运行中</g' "$STRINGS_PATH"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build with Gradle
        run: |
          cd Android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: Android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Edge-Gallery-API-Edition
          path: Android/app/build/outputs/apk/release/*.apk
          path: Android/app/build/outputs/apk/release/*.apk
