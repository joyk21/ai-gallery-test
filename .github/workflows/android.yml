name: Build AI Gallery - Chinese API Version

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Force Pull Edge Server Code (PR #647)
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git remote add upstream https://github.com/google-ai-edge/gallery.git
          git fetch upstream pull/647/head:edge-server-branch
          git reset --hard edge-server-branch

      - name: Inject Chinese Resources
        run: |
          # 1. [span_3](start_span)在正确的路径下创建中文资源文件夹[span_3](end_span)
          mkdir -p Android/src/app/src/main/res/values-zh-rCN/
          
          # 2. [span_4](start_span)[span_5](start_span)写入汉化内容[span_4](end_span)[span_5](end_span)
          cat <<'EOF' > Android/src/app/src/main/res/values-zh-rCN/strings.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="app_name">谷歌 AI 边缘实验室</string>
            <string name="benchmark">性能评测</string>
            <string name="chat_textinput_placeholder">输入消息…</string>
            <string name="aichat_emptystate_title">AI 聊天</string>
            <string name="mobile_actions_title">移动端操作 (Actions)</string>
            <string name="all">全部</string>
            <string name="add">添加</string>
            <string name="added">已添加</string>
            <string name="close">关闭</string>
            <string name="delete">删除</string>
            <string name="save">保存</string>
            <string name="settings_dialog_tos_title">服务条款</string>
          </resources>
          EOF

          # 3. [span_6](start_span)解决 AndroidManifest 包名冲突 (针对报错进行的修复)[span_6](end_span)
          # 删除 Manifest 中硬编码的 package 属性，改由 Gradle 统一管理命名空间
          find . -name "AndroidManifest.xml" -exec sed -i 's/package="com.google.ai.edge.gallery"//g' {} +

          # 4. [span_7](start_span)修改 Gradle 中的包名实现共存[span_7](end_span)
          find . -name "build.gradle*" -exec sed -i 's/com.google.ai.edge.gallery/com.google.ai.edge.gallery.api/g' {} +

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build and Sign APK
        run: |
          # [span_8](start_span)[span_9](start_span)切换到包含 gradlew 的正确目录[span_8](end_span)[span_9](end_span)
          cd Android/src
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: Android/src/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Gallery-Chinese-API
          path: Android/src/app/build/outputs/apk/release/*.apk

