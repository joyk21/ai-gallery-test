name: Build AI Gallery - Chinese API Version

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Force Pull Edge Server Code (PR #647)
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git remote add upstream https://github.com/google-ai-edge/gallery.git
          git fetch upstream pull/647/head:edge-server-branch
          git reset --hard edge-server-branch

      - name: Inject Chinese Resources & Fix Configs
        run: |
          # 1. 彻底物理删除冲突目录，确保环境洁净
          rm -rf Android/src/app/src/main/res/values-zh-rCN
          mkdir -p Android/src/app/src/main/res/values-zh-rCN/
          
          # 2. 注入汉化（去掉了可能冲突的 app_name，只翻译界面文字）
          cat <<'EOF' > Android/src/app/src/main/res/values-zh-rCN/strings.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="benchmark">性能评测</string>
            <string name="chat_textinput_placeholder">输入消息…</string>
            <string name="aichat_emptystate_title">AI 聊天</string>
            <string name="mobile_actions_title">移动端操作 (Actions)</string>
            <string name="all">全部</string>
            <string name="add">添加</string>
            <string name="added">已添加</string>
            <string name="close">关闭</string>
            <string name="delete">删除</string>
            <string name="save">保存</string>
            <string name="settings_dialog_tos_title">服务条款</string>
          </resources>
          EOF

          # 3. 修复 Google 服务配置文件 (使用原版包名)
          rm -f Android/src/app/google-services.json
          echo '{"project_info":{"project_number":"123","project_id":"fake-id"},"client":[{"client_info":{"mobilesdk_app_id":"1:123:android:abc","android_client_info":{"package_name":"com.google.ai.edge.gallery"}},"api_key":[{"current_key":"fake-key"}],"services":{}}],"configuration_version":"3"}' > Android/src/app/google-services.json

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build and Sign APK
        run: |
          cd Android/src
          chmod +x gradlew
          # 使用 clean 强制刷新所有资源引用
          ./gradlew clean assembleRelease --no-daemon -x test

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: Android/src/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Gallery-Chinese-API
          path: Android/src/app/build/outputs/apk/release/*.apk

