name: Build AI Gallery - Chinese API Version

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Force Pull Edge Server Code (PR #647)
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git remote add upstream https://github.com/google-ai-edge/gallery.git
          git fetch upstream pull/647/head:edge-server-branch
          git reset --hard edge-server-branch

      - name: Inject Chinese Resources & Fix Configs
        run: |
          # 1. 物理清理资源路径
          rm -rf Android/src/app/src/main/res/values-zh-rCN
          mkdir -p Android/src/app/src/main/res/values-zh-rCN/
          
          # 2. 注入带强制覆盖属性的汉化内容 (关键：加入 tools:override)
          cat <<'EOF' > Android/src/app/src/main/res/values-zh-rCN/strings.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources xmlns:tools="http://schemas.android.com/tools">
            <string name="benchmark" tools:override="true">性能评测</string>
            <string name="chat_textinput_placeholder" tools:override="true">输入消息…</string>
            <string name="aichat_emptystate_title" tools:override="true">AI 聊天</string>
            <string name="mobile_actions_title" tools:override="true">移动端操作 (Actions)</string>
            <string name="all" tools:override="true">全部</string>
            <string name="add" tools:override="true">添加</string>
            <string name="added" tools:override="true">已添加</string>
            <string name="close" tools:override="true">关闭</string>
            <string name="delete" tools:override="true">删除</string>
            <string name="save" tools:override="true">保存</string>
            <string name="settings_dialog_tos_title" tools:override="true">服务条款</string>
          </resources>
          EOF

          # 3. 彻底修复 Google 服务配置文件 (直接覆盖，不改包名以确保类兼容)
          rm -f Android/src/app/google-services.json
          echo '{"project_info":{"project_number":"123","project_id":"fake-id"},"client":[{"client_info":{"mobilesdk_app_id":"1:123:android:abc","android_client_info":{"package_name":"com.google.ai.edge.gallery"}},"api_key":[{"current_key":"fake-key"}],"services":{}}],"configuration_version":"3"}' > Android/src/app/google-services.json

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build and Sign APK
        run: |
          cd Android/src
          chmod +x gradlew
          # 使用 clean 任务确保不使用任何旧的、错误的资源索引
          ./gradlew clean assembleRelease --no-daemon -x test

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: Android/src/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Gallery-Chinese-API
          path: Android/src/app/build/outputs/apk/release/*.apk

