name: Build AI Gallery - Chinese API Version

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Force Pull Edge Server Code (PR #647)
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git remote add upstream https://github.com/google-ai-edge/gallery.git
          git fetch upstream pull/647/head:edge-server-branch
          git reset --hard edge-server-branch

      - name: In-place Translation & Fix Configs
        run: |
          # 定义目标文件路径 (PR 647 的原始英文路径)
          TARGET_FILE="Android/src/app/src/main/res/values/strings.xml"
          
          # 1. 使用 sed 直接修改原文件内容 (这样绝对不会有 Duplicate 冲突)
          # 我们把原本的英文标签替换为中文
          sed -i 's/>Benchmark</>性能评测</g' $TARGET_FILE
          sed -i 's/>Type a message…</>输入消息…</g' $TARGET_FILE
          sed -i 's/>AI Chat</>AI 聊天</g' $TARGET_FILE
          sed -i 's/>Mobile Actions</>移动端操作 (Actions)</string>/g' $TARGET_FILE
          sed -i 's/>All</>全部</g' $TARGET_FILE
          sed -i 's/>Add</>添加</g' $TARGET_FILE
          sed -i 's/>Added</>已添加</g' $TARGET_FILE
          sed -i 's/>Close</>关闭</g' $TARGET_FILE
          sed -i 's/>Delete</>删除</g' $TARGET_FILE
          sed -i 's/>Save</>保存</g' $TARGET_FILE
          sed -i 's/>Terms of Service</>服务条款</g' $TARGET_FILE

          # 2. 修复 Google 服务配置文件 (使用原版包名，防止类重复)
          rm -f Android/src/app/google-services.json
          echo '{"project_info":{"project_number":"123","project_id":"fake-id"},"client":[{"client_info":{"mobilesdk_app_id":"1:123:android:abc","android_client_info":{"package_name":"com.google.ai.edge.gallery"}},"api_key":[{"current_key":"fake-key"}],"services":{}}],"configuration_version":"3"}' > Android/src/app/google-services.json

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build and Sign APK
        run: |
          cd Android/src
          chmod +x gradlew
          # 使用 clean 并跳过测试
          ./gradlew clean assembleRelease --no-daemon -x test

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: Android/src/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Gallery-Chinese-API
          path: Android/src/app/build/outputs/apk/release/*.apk

