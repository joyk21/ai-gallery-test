name: Build AI Gallery - Chinese API Version

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Force Pull Edge Server Code (PR #647)
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git remote add upstream https://github.com/google-ai-edge/gallery.git
          git fetch upstream pull/647/head:edge-server-branch
          git reset --hard edge-server-branch

      - name: Global In-place Translation & Fix Configs
        run: |
          # 1. 全局扫描所有的 strings.xml 并执行原地替换
          # 这种方式不新增文件，不改包名，直接修改所有可能的源码
          find . -name "strings.xml" -type f -exec sed -i 's/>Benchmark</>性能评测</g' {} +
          find . -name "strings.xml" -type f -exec sed -i 's/>Type a message…</>输入消息…</g' {} +
          find . -name "strings.xml" -type f -exec sed -i 's/>AI Chat</>AI 聊天</g' {} +
          find . -name "strings.xml" -type f -exec sed -i 's/>Mobile Actions</>移动端操作 (Actions)</g' {} +
          find . -name "strings.xml" -type f -exec sed -i 's/>All</>全部</g' {} +
          find . -name "strings.xml" -type f -exec sed -i 's/>Add</>添加</g' {} +
          find . -name "strings.xml" -type f -exec sed -i 's/>Added</>已添加</g' {} +
          find . -name "strings.xml" -type f -exec sed -i 's/>Close</>关闭</g' {} +
          find . -name "strings.xml" -type f -exec sed -i 's/>Delete</>删除</g' {} +
          find . -name "strings.xml" -type f -exec sed -i 's/>Save</>保存</g' {} +
          find . -name "strings.xml" -type f -exec sed -i 's/>Terms of Service</>服务条款</g' {} +

          # 2. 彻底清理任何可能导致冲突的 zh-rCN 目录 (防止之前的残余)
          find . -name "values-zh-rCN" -type d -exec rm -rf {} +

          # 3. 修复 Google 服务配置文件
          rm -f Android/src/app/google-services.json
          echo '{"project_info":{"project_number":"123","project_id":"fake-id"},"client":[{"client_info":{"mobilesdk_app_id":"1:123:android:abc","android_client_info":{"package_name":"com.google.ai.edge.gallery"}},"api_key":[{"current_key":"fake-key"}],"services":{}}],"configuration_version":"3"}' > Android/src/app/google-services.json

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          # 暂时关闭缓存，确保使用最干净的环境
          # cache: gradle

      - name: Build and Sign APK
        run: |
          cd Android/src
          chmod +x gradlew
          # 使用 clean 强制重构所有资源索引
          ./gradlew clean assembleRelease --no-daemon -x test

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: Android/src/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Gallery-Chinese-API
          path: Android/src/app/build/outputs/apk/release/*.apk

